# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/ppo.yml#L32
# policy_kwargs: "dict(
#                   activation_fn=nn.ELU,
#                   net_arch=[32, 32],
#                   squash_output=False,
#                 )"

seed: 42

n_timesteps: !!float 40e6
policy: 'CnnPolicy'
n_steps: 64 # 16
batch_size: 256
gae_lambda: 0.95
gamma: 0.99
n_epochs: 1 # 20
ent_coef: 0.01
policy_kwargs: "dict(
                  features_extractor_class=spinal_surgery.lab.feature_extractors.sb3_cnn_extractor.DenseNetCNN,
                  features_extractor_kwargs=dict(
                    features_dim=512,
                  ),
                )"
learning_rate: !!float 1e-4
clip_range: !!float 0.1
vf_coef: 5.0
max_grad_norm: 10.0
device: "cuda:0"
