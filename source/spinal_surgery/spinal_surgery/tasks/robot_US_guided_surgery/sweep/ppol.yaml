# Configuration for a wandb sweep
# Running the following command under the hood:

program: scripts/reinforcement_learning/fsrl/train_ppol_agent.py
description: "surgery_PPOl_sweep"
name: surgery_PPOl_sweep
method: bayes
metric:
  goal: maximize
  name: total_reward
parameters:
  agent.repeat_per_collect: 
    values: [1, 3, 5]
  agent.batch_size: 
    values: [128, 32, 8]
  agent.lr: 
    values: [0.0001, 0.0003, 0.00003]

command:
  - /isaac-sim/python.sh
  - ${program}
  - "--headless"
  - "--task=Isaac-robot-US-guided-surgery-v0"
  - "--num_envs=16"
  - ${args_no_hyphens}
